<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100x Task Dashboard</title>
  <style>
    :root {
      --bg: #0a0f1f;
      --bg2: #10172b;
      --glass: rgba(255,255,255,0.08);
      --text: #e8ecff;
      --muted: #9aa6d1;
      --accent: #7c8cff;
      --accent2: #44e0c7;
      --danger: #ff6b8b;
      --warn: #ffb86b;
      --ok: #6cffb0;
      --shadow: 0 12px 40px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 700px at 10% -10%, #1f2a52 0%, transparent 50%),
                  radial-gradient(900px 600px at 90% 10%, #17384d 0%, transparent 45%),
                  linear-gradient(160deg, var(--bg), var(--bg2));
      padding: 28px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .card {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 18px;
    }

    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 { margin: 0; font-size: 1.4rem; letter-spacing: 0.2px; }
    .sub { color: var(--muted); font-size: 0.95rem; }

    .clock {
      font-weight: 600;
      color: var(--accent2);
      font-variant-numeric: tabular-nums;
    }

    .section-title {
      margin: 0 0 10px 0;
      font-size: 1rem;
      color: #d8deff;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input, select, button {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(6,10,20,0.45);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
    }

    input::placeholder { color: #93a0ca; }

    button {
      background: linear-gradient(135deg, var(--accent), #6f7cff);
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.9; }

    .task-list {
      display: grid;
      gap: 8px;
      max-height: 430px;
      overflow: auto;
      padding-right: 4px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .task.done { opacity: 0.65; }
    .task.done .text { text-decoration: line-through; }

    .pill {
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .p-high { background: rgba(255,107,139,0.18); color: #ff9ab0; }
    .p-med { background: rgba(255,184,107,0.2); color: #ffd09b; }
    .p-low { background: rgba(108,255,176,0.18); color: #9dffc9; }

    .meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .mini-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 8px;
      border-radius: 9px;
      color: #dbe3ff;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px;
    }

    .stat .n { font-size: 1.2rem; font-weight: 700; }
    .stat .l { color: var(--muted); font-size: 0.82rem; }

    .upcoming-item {
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .empty { color: var(--muted); font-size: 0.9rem; padding: 8px 0; }

    @media (max-width: 860px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card header">
      <div>
        <h1>100x Dashboard</h1>
        <div class="sub">Track current tasks + upcoming priorities</div>
      </div>
      <div class="clock" id="clock">--:--</div>
    </section>

    <section class="card">
      <h2 class="section-title">Tasks</h2>
      <div class="row">
        <input id="taskInput" type="text" placeholder="Add a task..." style="flex:1" />
        <select id="priority">
          <option value="high">High</option>
          <option value="med" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="row">
        <input id="due" type="datetime-local" style="flex:1" />
        <button id="addBtn">Add Task</button>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Overview</h2>
      <div class="stats">
        <div class="stat"><div class="n" id="totalN">0</div><div class="l">Total</div></div>
        <div class="stat"><div class="n" id="openN">0</div><div class="l">Open</div></div>
        <div class="stat"><div class="n" id="doneN">0</div><div class="l">Done</div></div>
      </div>

      <h3 class="section-title">Upcoming (next 7 days)</h3>
      <div id="upcoming"></div>
    </section>
  </div>

  <script>
    const STORE_KEY = 'x100_dashboard_tasks_v1';
    const taskInput = document.getElementById('taskInput');
    const priorityInput = document.getElementById('priority');
    const dueInput = document.getElementById('due');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const upcoming = document.getElementById('upcoming');
    const totalN = document.getElementById('totalN');
    const openN = document.getElementById('openN');
    const doneN = document.getElementById('doneN');
    const clock = document.getElementById('clock');

    let tasks = load();
    if (!tasks.length) {
      tasks = [{
        id: crypto.randomUUID(),
        text: 'Mark our CRT highs and lows',
        priority: 'high',
        due: '2026-03-04T08:00',
        done: false,
        createdAt: new Date().toISOString()
      }];
      save();
    }

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORE_KEY, JSON.stringify(tasks));
    }

    function fmtDue(iso) {
      if (!iso) return 'No due date';
      const d = new Date(iso);
      return d.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.unshift({
        id: crypto.randomUUID(),
        text,
        priority: priorityInput.value,
        due: dueInput.value || null,
        done: false,
        createdAt: new Date().toISOString()
      });
      taskInput.value = '';
      dueInput.value = '';
      save();
      render();
    }

    function toggleDone(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function delTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function render() {
      taskList.innerHTML = '';
      if (!tasks.length) {
        taskList.innerHTML = '<div class="empty">No tasks yet. Add one above.</div>';
      } else {
        tasks.forEach(t => {
          const div = document.createElement('div');
          div.className = 'task ' + (t.done ? 'done' : '');
          div.innerHTML = `
            <input type="checkbox" ${t.done ? 'checked' : ''} aria-label="toggle task" />
            <div class="text">${escapeHtml(t.text)}</div>
            <div class="meta">
              <span class="pill p-${t.priority}">${label(t.priority)}</span>
              <span>${fmtDue(t.due)}</span>
              <button class="mini-btn">Delete</button>
            </div>
          `;
          div.querySelector('input').addEventListener('change', () => toggleDone(t.id));
          div.querySelector('button').addEventListener('click', () => delTask(t.id));
          taskList.appendChild(div);
        });
      }

      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const open = total - done;
      totalN.textContent = total;
      openN.textContent = open;
      doneN.textContent = done;

      renderUpcoming();
    }

    function renderUpcoming() {
      const now = Date.now();
      const in7 = now + 7 * 24 * 60 * 60 * 1000;
      const upcomingTasks = tasks
        .filter(t => !t.done && t.due)
        .map(t => ({ ...t, ts: new Date(t.due).getTime() }))
        .filter(t => !Number.isNaN(t.ts) && t.ts >= now && t.ts <= in7)
        .sort((a,b) => a.ts - b.ts);

      upcoming.innerHTML = '';
      if (!upcomingTasks.length) {
        upcoming.innerHTML = '<div class="empty">No upcoming tasks in next 7 days.</div>';
        return;
      }

      upcomingTasks.forEach(t => {
        const el = document.createElement('div');
        el.className = 'upcoming-item';
        el.innerHTML = `<strong>${escapeHtml(t.text)}</strong><br><span class="sub">${fmtDue(t.due)} · ${label(t.priority)}</span>`;
        upcoming.appendChild(el);
      });
    }

    function label(p) {
      return p === 'high' ? 'HIGH' : p === 'low' ? 'LOW' : 'MED';
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function tickClock() {
      clock.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    tickClock();
    setInterval(tickClock, 1000);
    render();
  </script>
</body>
</html>
